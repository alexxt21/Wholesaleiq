<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>WholesaleIQ — Deal Finder Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--gold:#c9a84c;--bg:#080808;--text:#e8dcc8;--muted:#6a5a3a;--dim:#2a2218;}
  html,body{height:100%;width:100%;background:var(--bg);}
  body{color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#c9a84c33;border-radius:2px}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
  .glow{position:fixed;top:-15%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}

  /* Header */
  header{flex-shrink:0;position:relative;z-index:20;padding:14px 24px;border-bottom:1px solid rgba(201,168,76,0.15);background:rgba(8,8,8,0.94);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#c9a84c,#7a5c10);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .logo-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
  .logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .live-badge{display:flex;align-items:center;gap:7px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
  .live-text{color:#4ade80;font-size:11px;font-family:'DM Mono',monospace;}

  /* Main container */
  main{flex:1;display:flex;flex-direction:column;position:relative;z-index:5;min-height:0;overflow:hidden;}

  /* Landing screen */
  #landing{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px 40px;animation:fadeUp 0.5s ease;}
  .landing-inner{text-align:center;max-width:600px;width:100%;margin:auto;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,42px);font-weight:900;line-height:1.1;margin-bottom:10px;}
  .gradient-text{background:linear-gradient(90deg,#c9a84c,#f0d080,#c9a84c);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
  .hero-sub{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:30px;}
  .quick-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:24px;}
  .qbtn{padding:9px 18px;border-radius:6px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.22);color:#9a8050;font-size:13px;font-family:'DM Mono',monospace;letter-spacing:.04em;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;}
  .qbtn:hover,.qbtn:active{background:rgba(201,168,76,0.18);border-color:var(--gold);color:var(--gold);}
  .qbtn:disabled{opacity:.4;cursor:not-allowed;}
  #custom-box{display:none;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:16px;margin-bottom:16px;text-align:left;}
  .custom-label{color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;}
  #custom-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;line-height:1.6;resize:none;font-family:'DM Sans',sans-serif;}
  #custom-input::placeholder{color:#3a3028;}
  .run-btn{margin-top:10px;padding:9px 22px;border-radius:6px;background:var(--gold);border:none;color:#0a0a0a;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .18s;}
  .run-btn:hover{background:#b8963e;}
  .tags{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .tag{color:var(--dim);font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.05em;}

  /* Chat area */
  #chat-area{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:20px 20px 0;}
  .chat-inner{max-width:780px;margin:0 auto;padding-bottom:20px;}
  .msg{margin-bottom:20px;animation:fadeUp .35s ease;display:flex;flex-direction:column;}
  .msg.user{align-items:flex-end;}
  .msg.agent{align-items:flex-start;}
  .bubble-user{max-width:78%;background:rgba(201,168,76,0.11);border:1px solid rgba(201,168,76,0.28);border-radius:12px 12px 3px 12px;padding:11px 15px;color:var(--text);font-size:14px;line-height:1.6;}
  .agent-header{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .agent-icon{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#c9a84c,#7a5c10);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .agent-label{color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.08em;}
  .bubble-agent{background:rgba(255,255,255,0.02);border:1px solid rgba(201,168,76,0.11);border-radius:3px 12px 12px 12px;padding:18px 22px;width:100%;}
  .bubble-agent h2{color:var(--gold);font-size:16px;font-family:'Playfair Display',serif;margin:20px 0 8px;border-bottom:1px solid rgba(201,168,76,0.22);padding-bottom:5px;}
  .bubble-agent h2:first-child{margin-top:0;}
  .bubble-agent h3{color:var(--text);font-size:12px;font-family:'DM Mono',monospace;margin:12px 0 5px;letter-spacing:.06em;text-transform:uppercase;}
  .bubble-agent p{color:#c8bfaf;font-size:14px;line-height:1.7;margin:4px 0;}
  .bubble-agent strong{color:var(--text);}
  .bubble-agent hr{border:none;border-top:1px solid rgba(201,168,76,0.15);margin:16px 0;}
  .bubble-agent ul{list-style:none;padding:0;}
  .bubble-agent li{display:flex;gap:10px;margin:4px 0;padding-left:8px;color:#c8bfaf;font-size:14px;line-height:1.6;}
  .diamond{color:var(--gold);flex-shrink:0;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:14px 0;}
  .bubble-agent table{border-collapse:collapse;width:100%;font-size:13px;}
  .bubble-agent th{background:var(--gold);color:#0a0a0a;padding:8px 12px;text-align:left;font-family:'DM Mono',monospace;white-space:nowrap;}
  .bubble-agent td{padding:8px 12px;color:var(--text);border-bottom:1px solid rgba(201,168,76,0.13);white-space:nowrap;}
  .bubble-agent tr:nth-child(even) td{background:rgba(201,168,76,0.05);}

  /* Typing indicator */
  .typing{display:flex;gap:6px;padding:14px 4px;align-items:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:bounce 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}

  /* Error */
  .err-box{color:#f87171;font-size:13px;font-family:'DM Mono',monospace;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:6px;padding:10px 14px;margin:10px 0;word-break:break-all;line-height:1.5;}

  /* Input bar */
  #input-bar{display:none;flex-shrink:0;padding:12px 16px env(safe-area-inset-bottom, 12px);border-top:1px solid rgba(201,168,76,0.11);background:rgba(8,8,8,0.96);backdrop-filter:blur(10px);position:relative;z-index:10;}
  .input-inner{max-width:780px;margin:0 auto;}
  .input-wrap{display:flex;gap:10px;align-items:flex-end;background:rgba(201,168,76,0.055);border:1px solid rgba(201,168,76,0.18);border-radius:10px;padding:11px 14px;}
  #msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;line-height:1.5;resize:none;font-family:'DM Sans',sans-serif;max-height:100px;-webkit-appearance:none;}
  #msg-input::placeholder{color:#3a3028;}
  .send-btn{width:38px;height:38px;border-radius:8px;background:var(--gold);border:none;color:#0a0a0a;font-weight:900;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
  .send-btn:hover:not(:disabled),.send-btn:active:not(:disabled){background:#b8963e;}
  .send-btn:disabled{opacity:.35;cursor:not-allowed;}
  .bottom-quick{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;}
  .bqbtn{padding:6px 12px;border-radius:4px;background:transparent;border:1px solid rgba(201,168,76,0.18);color:#4a4030;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .bqbtn:hover,.bqbtn:active{background:rgba(201,168,76,0.12);color:var(--gold);border-color:var(--gold);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>

<header>
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div>
      <div class="logo-name">WholesaleIQ</div>
      <div class="logo-sub">Deal Finder · Powered by Claude</div>
    </div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span class="live-text">LIVE</span>
  </div>
</header>

<main>
  <div id="landing">
    <div class="landing-inner">
      <div style="font-size:50px;margin-bottom:14px;">🏚️</div>
      <h1>Find Your Next<br><span class="gradient-text">Wholesale Deal</span></h1>
      <p class="hero-sub">AI-powered sourcing across Florida and all 50 states.<br>ARV · MAO · Assignment Fees · Deal Ratings — formatted for your investor group.</p>
      <div class="quick-btns">
        <button class="qbtn" onclick="quickSearch('tampa')">📍 Tampa, FL</button>
        <button class="qbtn" onclick="quickSearch('cape')">📍 Cape Coral, FL</button>
        <button class="qbtn" onclick="quickSearch('jax')">📍 Jacksonville, FL</button>
        <button class="qbtn" onclick="quickSearch('orlando')">📍 Orlando, FL</button>
        <button class="qbtn" onclick="quickSearch('miami')">📍 Miami, FL</button>
        <button class="qbtn" onclick="toggleCustom()">✏️ Custom Search</button>
      </div>
      <div id="custom-box">
        <div class="custom-label">Describe your search</div>
        <textarea id="custom-input" rows="3" placeholder="e.g. Find deals in Atlanta GA under $200K, 3bd/2ba SFR for buy-and-hold investors..."></textarea>
        <button class="run-btn" onclick="sendCustom()">RUN SEARCH →</button>
      </div>
      <div class="tags">
        <span class="tag">Pre-Foreclosures</span>
        <span class="tag">Tax Deeds</span>
        <span class="tag">REO/Bank-Owned</span>
        <span class="tag">Probate Sales</span>
      </div>
    </div>
  </div>

  <div id="chat-area">
    <div class="chat-inner" id="chat-inner">
      <div id="bottom-anchor"></div>
    </div>
  </div>
</main>

<div id="input-bar">
  <div class="input-inner">
    <div class="input-wrap">
      <textarea id="msg-input" rows="2" placeholder="Search another market, refine criteria, or ask a follow-up..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">→</button>
    </div>
    <div class="bottom-quick">
      <button class="bqbtn" onclick="quickSearch('tampa')">Tampa, FL</button>
      <button class="bqbtn" onclick="quickSearch('cape')">Cape Coral, FL</button>
      <button class="bqbtn" onclick="quickSearch('jax')">Jacksonville, FL</button>
      <button class="bqbtn" onclick="quickSearch('orlando')">Orlando, FL</button>
    </div>
  </div>
</div>

<script>
const TODAY = new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
const SYSTEM=`You are WholesaleIQ, an elite real estate wholesale deal finder agent specializing in identifying deeply discounted, off-market, and distressed properties across the United States — primary focus on Florida (Tampa, Cape Coral, Jacksonville, Orlando, Miami, Lakeland).

TODAY'S DATE: ${TODAY}. Always reference current 2026 market conditions. Never reference 2024 or 2025 data as current. All market analysis, foreclosure pipelines, auction dates, and action plans should reflect the current date above.

For each search respond with:
## Market Snapshot
Foreclosure rates, days on market trends, price reductions, investor activity levels for this specific market.

## Top Deal Types
Best deal types to target here: pre-foreclosures/NODs, tax deeds, REO/bank-owned, probate, absentee owners, distressed/vacant.

## Sourcing Platforms
Best platforms for this specific market: PropertyOnion, Auction.com, Hubzu, Homepath, PropStream, BatchLeads, county tax deed sites, local REIA groups. Include direct URLs where possible.

## Deal Table
| Neighborhood | Type | Est. ARV | Est. Repairs | MAO | Assignment Fee | Rating |

## Red Flags
Insurance costs, flood zones, HOA restrictions, permit issues specific to this market.

## 24-48 Hr Action Plan
Specific immediate next steps.

Florida specifics: Lee/Charlotte County for Cape Coral, Hillsborough for Tampa, Duval for Jacksonville. Insurance crisis = motivated sellers. Hurricane damage = repair opportunities. Post-COVID foreclosure pipeline still active.
Be specific, data-driven, immediately actionable.`;

const QUERIES={
  tampa:"Find wholesale deals in Tampa FL under $300K. Distressed SFR for fix-and-flip. Full deal table with ARV, MAO, assignment fees, rating.",
  cape:"Find wholesale deals in Cape Coral FL under $300K. Include flood zone and insurance impact. Full deal table with ARV, MAO, assignment fees, rating.",
  jax:"Find wholesale deals in Jacksonville FL under $300K. Pre-foreclosures and REOs near medical corridors. Full deal table with ARV, MAO, assignment fees.",
  orlando:"Find wholesale deals in Orlando FL under $300K for short-term rental investors. Full deal table.",
  miami:"Find wholesale deals in Miami FL under $300K. Distressed condos and small multifamily. Full deal table."
};

let history=[],loading=false;

function toggleCustom(){
  const b=document.getElementById("custom-box");
  b.style.display=b.style.display==="block"?"none":"block";
}
function quickSearch(k){send(QUERIES[k]);}
function sendCustom(){const v=document.getElementById("custom-input").value.trim();if(v)send(v);}
function sendMsg(){const v=document.getElementById("msg-input").value.trim();if(v){document.getElementById("msg-input").value="";send(v);}}

document.getElementById("msg-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById("custom-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendCustom();}
});

function setLoading(on){
  loading=on;
  document.getElementById("send-btn").disabled=on;
  document.querySelectorAll(".qbtn,.bqbtn,.run-btn").forEach(b=>b.disabled=on);
}

function showChat(){
  document.getElementById("landing").style.display="none";
  document.getElementById("chat-area").style.display="block";
  document.getElementById("input-bar").style.display="block";
}

function appendMsg(role,content){
  const inner=document.getElementById("chat-inner");
  const anchor=document.getElementById("bottom-anchor");
  const div=document.createElement("div");
  div.className="msg "+role;
  if(role==="user"){
    div.innerHTML=`<div class="bubble-user">${esc(content)}</div>`;
  } else {
    div.innerHTML=`
      <div class="agent-header">
        <div class="agent-icon">⬡</div>
        <span class="agent-label">WHOLESALEIQ AGENT</span>
      </div>
      <div class="bubble-agent">${renderMd(content)}</div>`;
  }
  inner.insertBefore(div,anchor);
  setTimeout(()=>anchor.scrollIntoView({behavior:"smooth"}),100);
}

function showTyping(){
  const inner=document.getElementById("chat-inner");
  const anchor=document.getElementById("bottom-anchor");
  const div=document.createElement("div");
  div.className="msg agent";div.id="typing-ind";
  div.innerHTML=`
    <div class="agent-header">
      <div class="agent-icon">⬡</div>
      <span class="agent-label">WHOLESALEIQ AGENT</span>
    </div>
    <div class="bubble-agent">
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`;
  inner.insertBefore(div,anchor);
  setTimeout(()=>anchor.scrollIntoView({behavior:"smooth"}),100);
}

function hideTyping(){const t=document.getElementById("typing-ind");if(t)t.remove();}

function showErr(msg){
  const inner=document.getElementById("chat-inner");
  const anchor=document.getElementById("bottom-anchor");
  const div=document.createElement("div");
  div.className="err-box";
  div.textContent="⚠️ "+msg;
  inner.insertBefore(div,anchor);
  setTimeout(()=>anchor.scrollIntoView({behavior:"smooth"}),100);
}

async function send(text){
  if(loading)return;
  showChat();
  appendMsg("user",text);
  history.push({role:"user",content:text});
  setLoading(true);
  showTyping();
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"content-type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1500,
        system:SYSTEM,
        messages:history
      })
    });
    const data=await res.json();
    hideTyping();
    if(!res.ok){
      showErr("API error "+res.status+": "+(data?.error?.message||JSON.stringify(data).slice(0,150)));
      setLoading(false);return;
    }
    let reply="";
    if(Array.isArray(data.content))reply=data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
    else if(typeof data.content==="string")reply=data.content;
    if(!reply.trim()){showErr("Empty response from API");setLoading(false);return;}
    history.push({role:"assistant",content:reply});
    appendMsg("agent",reply);
  }catch(e){
    hideTyping();
    showErr("Network error: "+e.message);
  }
  setLoading(false);
}

function esc(t){
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function fmt(t){
  return esc(t).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
}

function renderMd(text){
  const lines=text.split("\n");
  let out="",inT=false,tRows=[];

  function flushT(){
    if(tRows.length<2){tRows.forEach(r=>out+=`<p>${esc(r)}</p>`);tRows=[];return;}
    const heads=tRows[0].split("|").map(h=>h.trim()).filter(Boolean);
    const rows=tRows.slice(2).map(r=>r.split("|").map(c=>c.trim()).filter(Boolean));
    out+=`<div class="table-wrap"><table><thead><tr>${heads.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>`;
    rows.forEach(row=>{out+=`<tr>${row.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`;});
    out+=`</tbody></table></div>`;
    tRows=[];
  }

  lines.forEach(line=>{
    if(line.startsWith("|")){inT=true;tRows.push(line);return;}
    if(inT){flushT();inT=false;}
    if(line.startsWith("## "))out+=`<h2>${esc(line.slice(3))}</h2>`;
    else if(line.startsWith("### "))out+=`<h3>${esc(line.slice(4))}</h3>`;
    else if(line.match(/^[-•] /))out+=`<ul><li><span class="diamond">◆</span><span>${fmt(line.slice(2))}</span></li></ul>`;
    else if(line.trim()==="---")out+=`<hr>`;
    else if(line.trim())out+=`<p>${fmt(line)}</p>`;
    else out+=`<div style="height:5px"></div>`;
  });
  if(inT)flushT();
  return out;
}
</script>
</body>
</html>
